<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OncoPulse — Weekly Literature Review</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1829;
    --surface: #162035;
    --surface2: #1c2a42;
    --border: #2a3d5c;
    --accent: #4d9fff;
    --accent3: #ff6b6b;
    --accent4: #ffd166;
    --text: #f0f4ff;
    --text-muted: #8ea8cc;
    --text-dim: #3d5478;
    --heme: #c084fc;
    --solid: #60d4f7;
    --fda: #4ade80;
    --phase2: #fb923c;
    --phase3: #4d9fff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(77,159,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(77,159,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,20,0.93);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    gap: 16px;
  }

  .logo { display: flex; align-items: baseline; gap: 8px; flex-shrink: 0; }
  .logo-mark { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); }
  .logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .week-badge { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
  .week-badge span { color: var(--accent); }

  .live-dot { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--fda); }
  .live-dot::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--fda); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

  .read-all-btn {
    padding: 6px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .read-all-btn:hover { border-color: var(--accent); color: var(--accent); }
  .read-all-btn.active { background: rgba(77,159,255,0.12); border-color: var(--accent); color: var(--accent); }

  main { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  /* Stats */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .stat-cell { background: var(--surface); padding: 16px 18px; cursor: pointer; transition: background 0.15s; }
  .stat-cell:hover { background: var(--surface2); }
  .stat-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 26px; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

  /* Controls */
  .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }

  .search-box { flex: 1; min-width: 240px; position: relative; }
  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 14px 9px 36px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 13px; }

  .filter-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .filter-btn {
    padding: 7px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: rgba(77,159,255,0.12); border-color: var(--accent); color: var(--accent); }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    outline: none;
    cursor: pointer;
  }

  /* Disease tabs */
  .disease-tabs { display: flex; gap: 4px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .disease-tabs::-webkit-scrollbar { display: none; }
  .disease-tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .disease-tab .count { background: var(--border); color: var(--text-dim); font-size: 9px; padding: 1px 5px; border-radius: 8px; }
  .disease-tab:hover { border-color: var(--text-muted); color: var(--text); }
  .disease-tab.active { border-color: var(--accent); color: var(--accent); }
  .disease-tab.active .count { background: rgba(77,159,255,0.15); color: var(--accent); }

  .result-count { font-size: 10px; color: var(--text-muted); margin-bottom: 14px; }
  .result-count span { color: var(--accent); }

  /* Article list — single column, compact rows */
  .article-list { display: flex; flex-direction: column; gap: 10px; }

  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    transition: all 0.15s;
    animation: fadeIn 0.3s ease both;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .article-card:hover { border-color: rgba(0,201,167,0.25); }
  .article-card.tts-active { border-color: rgba(0,201,167,0.5); box-shadow: 0 0 0 1px rgba(0,201,167,0.15); }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }

  .badge-col { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; padding-top: 2px; }

  .badge { font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; white-space: nowrap; }
  .badge-heme   { background: rgba(167,139,250,0.12); color: var(--heme);     border: 1px solid rgba(167,139,250,0.2); }
  .badge-solid  { background: rgba(56,189,248,0.12);  color: var(--solid);    border: 1px solid rgba(56,189,248,0.2); }
  .badge-fda    { background: rgba(74,222,128,0.12);  color: var(--fda);      border: 1px solid rgba(74,222,128,0.2); }
  .badge-phase3 { background: rgba(77,159,255,0.12);   color: var(--phase3);   border: 1px solid rgba(77,159,255,0.2); }
  .badge-phase2 { background: rgba(251,146,60,0.12);  color: var(--phase2);   border: 1px solid rgba(251,146,60,0.2); }
  .badge-review { background: rgba(107,122,148,0.1);  color: var(--text-muted); border: 1px solid rgba(107,122,148,0.15); }

  .card-main { flex: 1; min-width: 0; }

  .card-meta { font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }

  .card-title {
    font-family: 'Instrument Serif', serif;
    font-size: 15px;
    line-height: 1.45;
    color: var(--text);
    margin-bottom: 8px;
  }

  .card-abstract {
    font-size: 11px;
    line-height: 1.6;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-abstract.expanded {
    display: block;
    -webkit-line-clamp: unset;
  }

  .expand-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    padding: 0;
    margin-bottom: 10px;
    display: block;
  }

  .card-links {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .card-link {
    font-size: 10px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 10px;
  }
  .card-link:hover { color: var(--accent); border-color: var(--accent); }
  .card-link.pubmed { color: var(--text-muted); }
  .card-link.pubmed:hover { color: var(--accent4); border-color: var(--accent4); }

  .speak-btn {
    margin-left: auto;
    width: 26px;
    height: 26px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .speak-btn:hover { border-color: var(--accent); color: var(--accent); }
  .speak-btn.speaking { border-color: var(--accent); color: var(--accent); animation: speakPulse 1.2s ease-in-out infinite; }
  @keyframes speakPulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,201,167,.4)} 50%{box-shadow:0 0 0 4px rgba(0,201,167,0)} }

  /* Floating TTS bar */
  #ttsBar {
    position: fixed;
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    background: #111e33;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,.7);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 480px;
    max-width: 90vw;
    transition: bottom 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  #ttsBar.visible { bottom: 24px; }

  .tts-info { flex: 1; min-width: 0; }
  .tts-now-label { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; }
  .tts-title { font-family: 'Instrument Serif', serif; font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tts-progress-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .tts-track { flex: 1; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .tts-fill { height: 100%; background: var(--accent); width: 0%; transition: width .3s linear; }
  .tts-count { font-size: 9px; color: var(--text-dim); white-space: nowrap; }

  .tts-controls { display: flex; align-items: center; gap: 5px; }
  .tts-btn { width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .tts-btn:hover { background: var(--surface2); color: var(--text); }
  .tts-btn.primary { width: 34px; height: 34px; background: var(--accent); border-color: var(--accent); color: #000; border-radius: 9px; }
  .tts-btn.primary:hover { background: #00e0bb; }
  .tts-speed { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 4px 7px; color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 9px; cursor: pointer; outline: none; }
  .tts-close { width: 22px; height: 22px; border: none; background: transparent; color: var(--text-dim); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color .15s; flex-shrink: 0; }
  .tts-close:hover { color: var(--accent3); }

  /* Loading / error */
  .loading-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 14px; }
  .loading-spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; }

  .error-box { background: rgba(255,107,107,.08); border: 1px solid rgba(255,107,107,.2); border-radius: 10px; padding: 28px; text-align: center; margin: 40px 0; }
  .error-box h3 { color: var(--accent3); font-family: 'Syne', sans-serif; margin-bottom: 8px; }
  .error-box p { font-size: 11px; color: var(--text-muted); line-height: 1.6; }
  .error-box code { color: var(--accent); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 12px; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-mark">OncoPulse</span>
    <span class="logo-sub">Weekly Literature</span>
  </div>
  <div class="header-right">
    <span class="week-badge">Week of <span id="weekLabel">loading…</span></span>
    <button class="read-all-btn" id="readAllBtn" onclick="toggleReadAll()">▶ Read All</button>
    <span class="live-dot" id="updateBadge">UPDATED</span>
  </div>
</header>

<main id="mainContent">
  <div class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading literature data…</div>
  </div>
</main>

<!-- Floating TTS Bar -->
<div id="ttsBar">
  <div class="tts-info">
    <div class="tts-now-label">▶ Now Reading</div>
    <div class="tts-title" id="ttsTitle">—</div>
    <div class="tts-progress-row">
      <div class="tts-track"><div class="tts-fill" id="ttsFill"></div></div>
      <span class="tts-count" id="ttsCount"></span>
    </div>
  </div>
  <div class="tts-controls">
    <button class="tts-btn" onclick="ttsPrev()">⏮</button>
    <button class="tts-btn primary" id="ttsPlayPauseBtn" onclick="ttsTogglePause()">⏸</button>
    <button class="tts-btn" onclick="ttsNext()">⏭</button>
    <select class="tts-speed" id="ttsSpeedSelect" onchange="ttsSetSpeed(this.value)">
      <option value="0.8">0.8×</option>
      <option value="1" selected>1×</option>
      <option value="1.2">1.2×</option>
      <option value="1.5">1.5×</option>
      <option value="1.8">1.8×</option>
    </select>
  </div>
  <button class="tts-close" onclick="ttsStop()">✕</button>
</div>

<script>
let ARTICLES = [];
let currentTypeFilter = 'all';
let currentDiseaseFilter = 'all';

// ─── TTS ──────────────────────────────────────────────────────────────────────
const tts = { queue: [], idx: 0, utterance: null, paused: false, rate: 1.0, singleId: null };

function articleToSpeech(a) {
  const parts = [`${a.title}.`, `Published in ${a.journal}.`];
  if (a.abstract) parts.push(a.abstract);
  return parts.join(' ');
}

function ttsSpeak(text, onEnd) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = tts.rate; u.lang = 'en-US';
  u.onend = onEnd || null;
  u.onerror = e => { if (e.error !== 'interrupted') onEnd?.(); };
  tts.utterance = u;
  tts.paused = false;
  document.getElementById('ttsPlayPauseBtn').textContent = '⏸';
  window.speechSynthesis.speak(u);
}

function speakCard(articleId, btn) {
  const a = ARTICLES.find(x => x.uid === articleId);
  if (!a) return;
  if (tts.singleId === articleId && window.speechSynthesis.speaking) { ttsTogglePause(); return; }
  ttsStop(true);
  tts.singleId = articleId;
  tts.queue = [];
  document.querySelectorAll('.article-card').forEach(c => c.classList.remove('tts-active'));
  btn.closest('.article-card').classList.add('tts-active');
  btn.classList.add('speaking'); btn.textContent = '⏸';
  showTtsBar(a, 1, 1);
  ttsSpeak(articleToSpeech(a), () => {
    btn.classList.remove('speaking'); btn.textContent = '🔊';
    btn.closest('.article-card').classList.remove('tts-active');
    hideTtsBar(); tts.singleId = null;
  });
}

function toggleReadAll() {
  if (window.speechSynthesis.speaking || tts.queue.length > 0) { ttsStop(); return; }
  const cards = document.querySelectorAll('.article-card[data-uid]');
  if (!cards.length) return;
  tts.queue = Array.from(cards).map(el => ARTICLES.find(a => a.uid === el.dataset.uid)).filter(Boolean);
  tts.idx = 0; tts.singleId = null;
  document.getElementById('readAllBtn').classList.add('active');
  document.getElementById('readAllBtn').textContent = '■ Stop';
  playQueueItem(0);
}

function playQueueItem(idx) {
  if (idx >= tts.queue.length) { ttsStop(); return; }
  tts.idx = idx;
  const a = tts.queue[idx];
  document.querySelectorAll('.article-card').forEach(c => c.classList.remove('tts-active'));
  const card = document.querySelector(`.article-card[data-uid="${a.uid}"]`);
  if (card) {
    card.classList.add('tts-active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    const btn = card.querySelector('.speak-btn');
    if (btn) { btn.classList.add('speaking'); btn.textContent = '⏸'; }
  }
  showTtsBar(a, idx + 1, tts.queue.length);
  ttsSpeak(articleToSpeech(a), () => {
    if (card) {
      card.classList.remove('tts-active');
      const btn = card.querySelector('.speak-btn');
      if (btn) { btn.classList.remove('speaking'); btn.textContent = '🔊'; }
    }
    playQueueItem(idx + 1);
  });
}

function ttsNext() {
  if (!tts.queue.length) return;
  const card = document.querySelector(`.article-card[data-uid="${tts.queue[tts.idx]?.uid}"]`);
  if (card) { card.classList.remove('tts-active'); const b = card.querySelector('.speak-btn'); if(b){b.classList.remove('speaking');b.textContent='🔊';} }
  playQueueItem(tts.idx + 1);
}

function ttsPrev() {
  if (!tts.queue.length) return;
  const card = document.querySelector(`.article-card[data-uid="${tts.queue[tts.idx]?.uid}"]`);
  if (card) { card.classList.remove('tts-active'); const b = card.querySelector('.speak-btn'); if(b){b.classList.remove('speaking');b.textContent='🔊';} }
  playQueueItem(Math.max(0, tts.idx - 1));
}

function ttsTogglePause() {
  const btn = document.getElementById('ttsPlayPauseBtn');
  if (tts.paused) { window.speechSynthesis.resume(); tts.paused = false; btn.textContent = '⏸'; }
  else { window.speechSynthesis.pause(); tts.paused = true; btn.textContent = '▶'; }
}

function ttsSetSpeed(val) {
  tts.rate = parseFloat(val);
  if (window.speechSynthesis.speaking && tts.queue.length) playQueueItem(tts.idx);
}

function ttsStop(quiet = false) {
  window.speechSynthesis.cancel();
  tts.queue = []; tts.singleId = null; tts.paused = false;
  document.querySelectorAll('.article-card').forEach(c => {
    c.classList.remove('tts-active');
    const b = c.querySelector('.speak-btn');
    if (b) { b.classList.remove('speaking'); b.textContent = '🔊'; }
  });
  document.getElementById('readAllBtn').classList.remove('active');
  document.getElementById('readAllBtn').textContent = '▶ Read All';
  if (!quiet) hideTtsBar();
}

function showTtsBar(a, current, total) {
  document.getElementById('ttsTitle').textContent = a.title;
  document.getElementById('ttsCount').textContent = total > 1 ? `${current} / ${total}` : '';
  document.getElementById('ttsFill').style.width = total > 1 ? Math.round(((current-1)/total)*100)+'%' : '0%';
  document.getElementById('ttsBar').classList.add('visible');
  document.getElementById('ttsPlayPauseBtn').textContent = '⏸';
}

function hideTtsBar() { document.getElementById('ttsBar').classList.remove('visible'); }

// ─── Data loading ─────────────────────────────────────────────────────────────
async function loadData() {
  const r = await fetch('data.json');
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ─── Build UI ─────────────────────────────────────────────────────────────────
function buildStats(stats) {
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-cell" onclick="filterByType('all')">
      <div class="stat-value" style="color:var(--text)">${stats.total}</div>
      <div class="stat-label">Total Articles</div>
    </div>
    <div class="stat-cell" onclick="filterByType('phase3')">
      <div class="stat-value" style="color:var(--phase3)">${stats.phase3}</div>
      <div class="stat-label">Phase 3</div>
    </div>
    <div class="stat-cell" onclick="filterByType('phase2')">
      <div class="stat-value" style="color:var(--phase2)">${stats.phase2}</div>
      <div class="stat-label">Phase 2</div>
    </div>
    <div class="stat-cell" onclick="filterByType('fda')">
      <div class="stat-value" style="color:var(--fda)">${stats.fda}</div>
      <div class="stat-label">FDA Actions</div>
    </div>
    <div class="stat-cell" onclick="filterByType('review')">
      <div class="stat-value" style="color:var(--text-muted)">${stats.review}</div>
      <div class="stat-label">Reviews</div>
    </div>
  `;
}

function buildDiseaseTabs(articles) {
  const counts = {};
  articles.forEach(a => { counts[a.disease] = (counts[a.disease]||0)+1; });
  const LABELS = {
    lymphoma:'Lymphoma', leukemia:'Leukemia', myeloma:'Myeloma',
    lung:'Lung', breast:'Breast', gi:'GI', gu:'GU', cns:'CNS',
    gynecologic:'Gynecologic', skin:'Skin', head_neck:'Head & Neck',
    sarcoma:'Sarcoma', other:'Other'
  };
  const el = document.getElementById('diseaseTabs');
  el.innerHTML = `<button class="disease-tab active" onclick="setDiseaseFilter('all',this)">All <span class="count">${articles.length}</span></button>`;
  for (const [d, label] of Object.entries(LABELS)) {
    if (!counts[d]) continue;
    const b = document.createElement('button');
    b.className = 'disease-tab';
    b.innerHTML = `${label} <span class="count">${counts[d]}</span>`;
    b.onclick = function(){ setDiseaseFilter(d, this); };
    el.appendChild(b);
  }
}

function renderLayout(data) {
  document.getElementById('weekLabel').textContent = data.week_label;
  document.getElementById('updateBadge').title = `Updated ${new Date(data.generated_at).toLocaleString()}`;
  document.getElementById('mainContent').innerHTML = `
    <div class="stats-bar" id="statsBar"></div>
    <div class="controls">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search titles, journals, disease…" oninput="applyFilters()">
      </div>
      <div class="filter-group" id="typeFilters">
        <button class="filter-btn active" onclick="setTypeFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setTypeFilter('fda',this)">FDA</button>
        <button class="filter-btn" onclick="setTypeFilter('phase3',this)">Phase 3</button>
        <button class="filter-btn" onclick="setTypeFilter('phase2',this)">Phase 2</button>
        <button class="filter-btn" onclick="setTypeFilter('review',this)">Review</button>
      </div>
      <select class="sort-select" id="sortSelect" onchange="applyFilters()">
        <option value="date">Newest</option>
        <option value="title">A–Z</option>
      </select>
    </div>
    <div class="disease-tabs" id="diseaseTabs"></div>
    <div class="result-count"><span id="countNum">0</span> articles</div>
    <div class="article-list" id="articleList"></div>
  `;
  buildStats(data.stats);
  buildDiseaseTabs(data.articles);
  applyFilters();
}

// ─── Filters ──────────────────────────────────────────────────────────────────
function setTypeFilter(type, btn) {
  currentTypeFilter = type;
  document.querySelectorAll('#typeFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterByType(type) {
  currentTypeFilter = type;
  document.querySelectorAll('#typeFilters .filter-btn').forEach(b => {
    b.classList.toggle('active', type==='all' ? b.textContent.trim()==='All' : b.textContent.toLowerCase().includes(type));
  });
  applyFilters();
}

function setDiseaseFilter(d, btn) {
  currentDiseaseFilter = d;
  document.querySelectorAll('.disease-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const sort = document.getElementById('sortSelect')?.value||'date';
  let filtered = ARTICLES.filter(a => {
    const mt = currentTypeFilter==='all' || a.type===currentTypeFilter;
    const md = currentDiseaseFilter==='all' || a.disease===currentDiseaseFilter;
    const ms = !q || a.title.toLowerCase().includes(q) || (a.abstract||'').toLowerCase().includes(q) || (a.journal||'').toLowerCase().includes(q);
    return mt && md && ms;
  });
  if (sort==='date') filtered.sort((a,b)=>(b.pub_date||'').localeCompare(a.pub_date||''));
  else filtered.sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  renderArticles(filtered);
  document.getElementById('countNum').textContent = filtered.length;
}

function toggleAbstract(btn, uid) {
  const el = document.querySelector(`.abstract-text[data-uid="${uid}"]`);
  if (!el) return;
  const expanded = el.classList.toggle('expanded');
  btn.textContent = expanded ? '▲ Show less' : '▼ Read more';
}

function renderArticles(articles) {
  const list = document.getElementById('articleList');
  if (!list) return;
  if (!articles.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">◎</div><p>No articles match your filters.</p></div>`;
    return;
  }

  list.innerHTML = articles.map((a, i) => {
    const catBadge = a.category==='heme'
      ? `<span class="badge badge-heme">Heme</span>`
      : `<span class="badge badge-solid">Solid</span>`;
    const typeBadge = a.type==='fda'    ? `<span class="badge badge-fda">FDA</span>`
                    : a.type==='phase3' ? `<span class="badge badge-phase3">Ph3</span>`
                    : a.type==='phase2' ? `<span class="badge badge-phase2">Ph2</span>`
                    :                    `<span class="badge badge-review">Rev</span>`;

    const borderColor = a.category==='heme' ? 'var(--heme)' : 'var(--solid)';

    const abstractHtml = a.abstract
      ? `<div class="card-abstract abstract-text" data-uid="${a.uid}">${a.abstract}</div>
         <button class="expand-btn" onclick="toggleAbstract(this,'${a.uid}')">▼ Read more</button>`
      : '';

    const sourceLink = a.source_link
      ? `<a class="card-link" href="${a.source_link}" target="_blank" rel="noopener">↗ Source</a>`
      : '';
    const pubmedLink = a.pubmed_link
      ? `<a class="card-link pubmed" href="${a.pubmed_link}" target="_blank" rel="noopener">PubMed</a>`
      : '';

    return `
    <div class="article-card" data-uid="${a.uid}" style="animation-delay:${i*0.03}s;border-left:3px solid ${borderColor}">
      <div class="card-top">
        <div class="badge-col">${catBadge}${typeBadge}</div>
        <div class="card-main">
          <div class="card-meta">${a.journal || ''}${a.pub_date ? ' · '+a.pub_date : ''}</div>
          <div class="card-title">${a.title}</div>
          ${abstractHtml}
          <div class="card-links">
            ${sourceLink}${pubmedLink}
            <button class="speak-btn" onclick="speakCard('${a.uid}',this)" title="Read aloud">🔊</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
(async () => {
  try {
    const data = await loadData();
    ARTICLES = data.articles || [];
    renderLayout(data);
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `
      <div class="error-box">
        <h3>Could not load data</h3>
        <p>Make sure <code>data.json</code> exists in the dashboard folder.<br>
        Run: <code>python pipeline/fetch_and_summarize.py</code><br><br>
        Error: ${e.message}</p>
      </div>`;
  }
})();
</script>
</body>
</html>
