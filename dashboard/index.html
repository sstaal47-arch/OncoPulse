<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OncoPulse — Weekly Literature Review</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1829;
    --surface: #162035;
    --surface2: #1c2a42;
    --border: #2a3d5c;
    --accent: #4d9fff;
    --accent3: #ff6b6b;
    --accent4: #ffd166;
    --text: #f0f4ff;
    --text-muted: #8ea8cc;
    --text-dim: #3d5478;
    --heme: #c084fc;
    --solid: #60d4f7;
    --fda: #4ade80;
    --phase2: #fb923c;
    --phase3: #4d9fff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(77,159,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(77,159,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,20,0.93);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    gap: 16px;
  }

  .logo { display: flex; align-items: baseline; gap: 8px; flex-shrink: 0; }
  .logo-mark { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); }
  .logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .week-badge { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
  .week-badge span { color: var(--accent); }

  .live-dot { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--fda); }
  .live-dot::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--fda); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

  .read-all-btn {
    padding: 6px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .read-all-btn:hover { border-color: var(--accent); color: var(--accent); }
  .read-all-btn.active { background: rgba(77,159,255,0.12); border-color: var(--accent); color: var(--accent); }

  main { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  /* Stats */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .stat-cell { background: var(--surface); padding: 16px 18px; cursor: pointer; transition: background 0.15s; }
  .stat-cell:hover { background: var(--surface2); }
  .stat-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 26px; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

  /* Controls */
  .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }

  .search-box { flex: 1; min-width: 240px; position: relative; }
  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 14px 9px 36px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 13px; }

  .filter-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .filter-btn {
    padding: 7px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: rgba(77,159,255,0.12); border-color: var(--accent); color: var(--accent); }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    outline: none;
    cursor: pointer;
  }

  /* Disease tabs */
  .disease-tabs { display: flex; gap: 4px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .disease-tabs::-webkit-scrollbar { display: none; }
  .disease-tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .disease-tab .count { background: var(--border); color: var(--text-dim); font-size: 9px; padding: 1px 5px; border-radius: 8px; }
  .disease-tab:hover { border-color: var(--text-muted); color: var(--text); }
  .disease-tab.active { border-color: var(--accent); color: var(--accent); }
  .disease-tab.active .count { background: rgba(77,159,255,0.15); color: var(--accent); }

  .result-count { font-size: 10px; color: var(--text-muted); margin-bottom: 14px; }
  .result-count span { color: var(--accent); }

  /* Article list — single column, compact rows */
  .article-list { display: flex; flex-direction: column; gap: 10px; }

  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    transition: all 0.15s;
    animation: fadeIn 0.3s ease both;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .article-card:hover { border-color: rgba(0,201,167,0.25); }
  .article-card.tts-active { border-color: rgba(0,201,167,0.5); box-shadow: 0 0 0 1px rgba(0,201,167,0.15); }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }

  .badge-col { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; padding-top: 2px; }

  .badge { font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; white-space: nowrap; }
  .badge-heme   { background: rgba(167,139,250,0.12); color: var(--heme);     border: 1px solid rgba(167,139,250,0.2); }
  .badge-solid  { background: rgba(56,189,248,0.12);  color: var(--solid);    border: 1px solid rgba(56,189,248,0.2); }
  .badge-fda    { background: rgba(74,222,128,0.12);  color: var(--fda);      border: 1px solid rgba(74,222,128,0.2); }
  .badge-phase3 { background: rgba(77,159,255,0.12);   color: var(--phase3);   border: 1px solid rgba(77,159,255,0.2); }
  .badge-phase2 { background: rgba(251,146,60,0.12);  color: var(--phase2);   border: 1px solid rgba(251,146,60,0.2); }
  .badge-review { background: rgba(107,122,148,0.1);  color: var(--text-muted); border: 1px solid rgba(107,122,148,0.15); }

  .card-main { flex: 1; min-width: 0; }

  .card-meta { font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }

  .card-title {
    font-family: 'Instrument Serif', serif;
    font-size: 15px;
    line-height: 1.45;
    color: var(--text);
    margin-bottom: 8px;
  }

  .card-abstract {
    font-size: 11px;
    line-height: 1.6;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-abstract.expanded {
    display: block;
    -webkit-line-clamp: unset;
  }

  .expand-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    padding: 0;
    margin-bottom: 10px;
    display: block;
  }

  .card-links {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .card-link {
    font-size: 10px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 10px;
  }
  .card-link:hover { color: var(--accent); border-color: var(--accent); }
  .card-link.pubmed { color: var(--text-muted); }
  .card-link.pubmed:hover { color: var(--accent4); border-color: var(--accent4); }

  .speak-btn {
    margin-left: auto;
    width: 26px;
    height: 26px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .speak-btn:hover { border-color: var(--accent); color: var(--accent); }
  .speak-btn.speaking { border-color: var(--accent); color: var(--accent); animation: speakPulse 1.2s ease-in-out infinite; }
  @keyframes speakPulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,201,167,.4)} 50%{box-shadow:0 0 0 4px rgba(0,201,167,0)} }

  /* Floating TTS bar */
  #ttsBar {
    position: fixed;
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    background: #111e33;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,.7);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 480px;
    max-width: 90vw;
    transition: bottom 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  #ttsBar.visible { bottom: 24px; }

  .tts-info { flex: 1; min-width: 0; }
  .tts-now-label { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; }
  .tts-title { font-family: 'Instrument Serif', serif; font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tts-progress-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .tts-track { flex: 1; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .tts-fill { height: 100%; background: var(--accent); width: 0%; transition: width .3s linear; }
  .tts-count { font-size: 9px; color: var(--text-dim); white-space: nowrap; }

  .tts-controls { display: flex; align-items: center; gap: 5px; }
  .tts-btn { width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .tts-btn:hover { background: var(--surface2); color: var(--text); }
  .tts-btn.primary { width: 34px; height: 34px; background: var(--accent); border-color: var(--accent); color: #000; border-radius: 9px; }
  .tts-btn.primary:hover { background: #00e0bb; }
  .tts-speed { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 4px 7px; color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 9px; cursor: pointer; outline: none; }
  .tts-close { width: 22px; height: 22px; border: none; background: transparent; color: var(--text-dim); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color .15s; flex-shrink: 0; }
  .tts-close:hover { color: var(--accent3); }

  /* Loading / error */
  .loading-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 14px; }
  .loading-spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; }

  .error-box { background: rgba(255,107,107,.08); border: 1px solid rgba(255,107,107,.2); border-radius: 10px; padding: 28px; text-align: center; margin: 40px 0; }
  .error-box h3 { color: var(--accent3); font-family: 'Syne', sans-serif; margin-bottom: 8px; }
  .error-box p { font-size: 11px; color: var(--text-muted); line-height: 1.6; }
  .error-box code { color: var(--accent); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 12px; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Favorites ── */
  .fav-btn {
    width: 26px;
    height: 26px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .fav-btn:hover { border-color: var(--accent4); color: var(--accent4); }
  .fav-btn.saved {
    border-color: var(--accent4);
    color: var(--accent4);
    background: rgba(255,209,102,0.1);
  }

  .saved-tab-btn {
    padding: 6px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .saved-tab-btn:hover { border-color: var(--accent4); color: var(--accent4); }
  .saved-tab-btn.active { background: rgba(255,209,102,0.1); border-color: var(--accent4); color: var(--accent4); }

  .saved-count-badge {
    background: var(--accent4);
    color: #000;
    font-size: 8px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 8px;
    min-width: 16px;
    text-align: center;
    display: none;
  }
  .saved-count-badge.visible { display: inline-block; }

  /* Saved folder panel */
  #savedPanel {
    display: none;
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid rgba(255,209,102,0.25);
    border-radius: 12px;
    overflow: hidden;
  }
  #savedPanel.visible { display: block; }

  .saved-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,209,102,0.05);
  }
  .saved-panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent4);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .saved-panel-subtitle { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .clear-saved-btn {
    font-size: 10px;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }
  .clear-saved-btn:hover { color: var(--accent3); border-color: var(--accent3); }

  .saved-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .saved-empty { padding: 32px; text-align: center; font-size: 11px; color: var(--text-dim); }

  .saved-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: border-color 0.15s;
  }
  .saved-item:hover { border-color: rgba(255,209,102,0.3); }
  .saved-item-main { flex: 1; min-width: 0; }
  .saved-item-meta { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .saved-item-title { font-family: 'Instrument Serif', serif; font-size: 13px; color: var(--text); line-height: 1.4; margin-bottom: 6px; }
  .saved-item-links { display: flex; gap: 8px; }
  .saved-item-link {
    font-size: 9px; color: var(--text-dim); text-decoration: none;
    border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px;
    transition: all 0.15s;
  }
  .saved-item-link:hover { color: var(--accent); border-color: var(--accent); }

  .unsave-btn {
    width: 22px; height: 22px; border-radius: 4px; border: none;
    background: transparent; color: var(--text-dim); font-size: 14px;
    cursor: pointer; transition: color 0.15s; flex-shrink: 0; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .unsave-btn:hover { color: var(--accent3); }

  /* ── Settings ── */
  .settings-btn {
    padding: 6px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .settings-btn:hover { border-color: var(--accent); color: var(--accent); }
  .settings-btn.active { background: rgba(77,159,255,0.1); border-color: var(--accent); color: var(--accent); }

  #settingsPanel {
    display: none;
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid rgba(77,159,255,0.25);
    border-radius: 12px;
    overflow: hidden;
  }
  #settingsPanel.visible { display: block; }

  .settings-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(77,159,255,0.04);
  }
  .settings-panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }
  .settings-panel-subtitle { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .settings-close-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px;
    border: 1px solid var(--accent);
    background: rgba(77,159,255,0.1);
    color: var(--accent); font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .settings-close-btn:hover { background: rgba(77,159,255,0.22); }
  .settings-back-bar {
    display: flex; justify-content: center;
    padding: 12px 20px 20px; border-top: 1px solid var(--border);
  }
  .settings-back-bar button {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    background: var(--accent); color: #fff;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.15s;
  }
  .settings-back-bar button:hover { opacity: 0.85; }

  .settings-body { padding: 20px; display: flex; flex-direction: column; gap: 24px; }

  .settings-section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .settings-chip-group { display: flex; flex-wrap: wrap; gap: 6px; }

  .settings-chip {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .settings-chip:hover { border-color: var(--accent); color: var(--accent); }
  .settings-chip.selected { background: rgba(77,159,255,0.12); border-color: var(--accent); color: var(--accent); }

  .settings-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

  .settings-number {
    width: 80px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;

    font-family: 'DM Mono', monospace;

  .settings-label { font-size: 11px; color: var(--text-muted); }

  .settings-save-btn {

    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;

  }
  .settings-reset-btn:hover { color: var(--accent3); border-color: var(--accent3); }

  .settings-active-banner {
    display: none;
    background: rgba(77,159,255,0.07);
    border: 1px solid rgba(77,159,255,0.2);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 16px;
    align-items: center;

  }
  .settings-active-banner.visible { display: flex; }
  .del-btn {
    width: 26px;
    height: 26px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .del-btn:hover { border-color: var(--accent3); color: var(--accent3); background: rgba(255,107,107,0.08); }

  .deleted-tab-btn {
    padding: 6px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .deleted-tab-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .deleted-tab-btn.active { background: rgba(255,107,107,0.08); border-color: var(--accent3); color: var(--accent3); }

  .deleted-count-badge {
    background: var(--accent3);
    color: #fff;
    font-size: 8px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 8px;
    min-width: 16px;
    text-align: center;
    display: none;
  }
  .deleted-count-badge.visible { display: inline-block; }

  /* ── Rank & Altmetric ── */
  .rank-badge {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 800;
    color: var(--text-dim);
    min-width: 28px;
    text-align: right;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .rank-badge.top { color: var(--accent4); }

  .altmetric-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 10px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .altmetric-pill:hover { border-color: var(--accent4); color: var(--accent4); }
  .altmetric-pill.high { border-color: rgba(255,209,102,0.4); color: var(--accent4); background: rgba(255,209,102,0.06); }
  .altmetric-pill.very-high { border-color: var(--accent4); color: var(--accent4); background: rgba(255,209,102,0.12); font-weight: 700; }

  /* Deleted panel */
  #deletedPanel {
    display: none;
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid rgba(255,107,107,0.2);
    border-radius: 12px;
    overflow: hidden;
  }
  #deletedPanel.visible { display: block; }

  .deleted-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,107,107,0.04);
  }
  .deleted-panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent3);
  }
  .deleted-panel-subtitle { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .deleted-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .deleted-empty { padding: 32px; text-align: center; font-size: 11px; color: var(--text-dim); }

  .deleted-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    opacity: 0.7;
    transition: all 0.15s;
  }
  .deleted-item:hover { opacity: 1; border-color: rgba(255,107,107,0.3); }
  .deleted-item-main { flex: 1; min-width: 0; }
  .deleted-item-meta { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .deleted-item-title { font-family: 'Instrument Serif', serif; font-size: 13px; color: var(--text-muted); line-height: 1.4; text-decoration: line-through; }

  .restore-btn {
    font-size: 9px; color: var(--accent); background: none;
    border: 1px solid var(--accent); border-radius: 4px; padding: 3px 8px;
    cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.15s;
    white-space: nowrap; flex-shrink: 0; margin-top: 2px;
  }
  .restore-btn:hover { background: rgba(77,159,255,0.1); }

  /* Article card deleted state */
  .article-card.deleted-card {
    opacity: 0;
    transform: translateX(40px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
    max-height: 0;
    padding: 0;
    margin: 0;
    border: none;
    overflow: hidden;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-mark">OncoPulse</span>
    <span class="logo-sub">Weekly Literature</span>
  </div>
  <div class="header-right">
    <span class="week-badge">Week of <span id="weekLabel">loading…</span></span>
    <button class="saved-tab-btn" id="savedTabBtn" onclick="toggleSavedPanel()">
      ★ Saved <span class="saved-count-badge" id="savedCountBadge">0</span>
    </button>
    <button class="deleted-tab-btn" id="deletedTabBtn" onclick="toggleDeletedPanel()">
      🗑 Deleted <span class="deleted-count-badge" id="deletedCountBadge">0</span>
    </button>
    <button class="settings-btn" id="settingsBtn" onclick="toggleSettingsPanel()">⚙ Settings</button>
    <button class="read-all-btn" id="readAllBtn" onclick="toggleReadAll()">▶ Read All</button>
    <span class="live-dot" id="updateBadge">UPDATED</span>
  </div>
</header>

<main id="mainContent">
  <div class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading literature data…</div>
  </div>
</main>

<!-- Saved Articles Panel (injected into main dynamically) -->

<!-- Floating TTS Bar -->
<div id="ttsBar">
  <div class="tts-info">
    <div class="tts-now-label">▶ Now Reading</div>
    <div class="tts-title" id="ttsTitle">—</div>
    <div class="tts-progress-row">
      <div class="tts-track"><div class="tts-fill" id="ttsFill"></div></div>
      <span class="tts-count" id="ttsCount"></span>
    </div>
  </div>
  <div class="tts-controls">
    <button class="tts-btn" onclick="ttsPrev()">⏮</button>
    <button class="tts-btn primary" id="ttsPlayPauseBtn" onclick="ttsTogglePause()">⏸</button>
    <button class="tts-btn" onclick="ttsNext()">⏭</button>
    <select class="tts-speed" id="ttsSpeedSelect" onchange="ttsSetSpeed(this.value)">
      <option value="0.8">0.8×</option>
      <option value="1" selected>1×</option>
      <option value="1.2">1.2×</option>
      <option value="1.5">1.5×</option>
      <option value="1.8">1.8×</option>
    </select>
  </div>
  <button class="tts-close" onclick="ttsStop()">✕</button>
</div>

<script>
let ARTICLES = [];
let currentTypeFilter = 'all';
let currentDiseaseFilter = 'all';
let showingSaved = false;

// ─── Favorites (persisted in localStorage) ───────────────────────────────────
const FAVS_KEY = 'oncopulse_favorites';

function loadFavs() {
  try { return JSON.parse(localStorage.getItem(FAVS_KEY) || '{}'); }
  catch { return {}; }
}

function saveFavs(favs) {
  localStorage.setItem(FAVS_KEY, JSON.stringify(favs));
}

function isFav(uid) { return !!loadFavs()[uid]; }

function toggleFav(uid, btn) {
  const favs = loadFavs();
  const article = ARTICLES.find(a => a.uid === uid);
  if (!article) return;

  if (favs[uid]) {
    delete favs[uid];
    btn.classList.remove('saved');
    btn.title = 'Save to favorites';
    btn.textContent = '☆';
  } else {
    favs[uid] = {
      uid: article.uid,
      title: article.title,
      journal: article.journal,
      pub_date: article.pub_date,
      type: article.type,
      disease: article.disease,
      category: article.category,
      source_link: article.source_link,
      pubmed_link: article.pubmed_link,
      saved_at: new Date().toISOString(),
    };
    btn.classList.add('saved');
    btn.title = 'Remove from favorites';
    btn.textContent = '★';

    // Brief sparkle animation
    btn.style.transform = 'scale(1.3)';
    setTimeout(() => { btn.style.transform = ''; }, 200);
  }

  saveFavs(favs);
  updateSavedBadge();
  if (showingSaved) renderSavedPanel();
}

function updateSavedBadge() {
  const count = Object.keys(loadFavs()).length;
  const badge = document.getElementById('savedCountBadge');
  const btn   = document.getElementById('savedTabBtn');
  if (!badge || !btn) return;
  badge.textContent = count;
  badge.classList.toggle('visible', count > 0);
  btn.classList.toggle('active', showingSaved);
}

function toggleSavedPanel() {
  showingSaved = !showingSaved;
  document.getElementById('savedTabBtn').classList.toggle('active', showingSaved);
  const panel = document.getElementById('savedPanel');
  if (!panel) return;
  if (showingSaved) {
    panel.classList.add('visible');
    renderSavedPanel();
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    panel.classList.remove('visible');
  }
}

function renderSavedPanel() {
  const panel = document.getElementById('savedPanel');
  if (!panel) return;
  const favs = loadFavs();
  const items = Object.values(favs).sort((a, b) => (b.saved_at || '').localeCompare(a.saved_at || ''));

  const listHtml = items.length === 0
    ? `<div class="saved-empty">No saved articles yet. Click ☆ on any article to save it here.</div>`
    : `<div class="saved-list">${items.map(a => {
        const sourceLink = a.source_link
          ? `<a class="saved-item-link" href="${a.source_link}" target="_blank" rel="noopener">↗ Source</a>` : '';
        const pubmedLink = a.pubmed_link
          ? `<a class="saved-item-link" href="${a.pubmed_link}" target="_blank" rel="noopener">PubMed</a>` : '';
        const typeLabel = a.type === 'fda' ? 'FDA' : a.type === 'phase3' ? 'Phase 3' : a.type === 'phase2' ? 'Phase 2' : 'Review';
        const catLabel  = a.category === 'heme' ? 'Hematology' : 'Solid Tumor';
        return `
        <div class="saved-item">
          <div class="saved-item-main">
            <div class="saved-item-meta">${catLabel} · ${typeLabel} · ${a.journal || ''} · ${a.pub_date || ''}</div>
            <div class="saved-item-title">${a.title}</div>
            <div class="saved-item-links">${sourceLink}${pubmedLink}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
            <button class="unsave-btn" onclick="unsaveFromPanel('${a.uid}')" title="Remove from saved">★</button>
            <button class="unsave-btn" onclick="deleteFromSaved('${a.uid}')" title="Delete article" style="font-size:12px">🗑</button>
          </div>
        </div>`;
      }).join('')}</div>`;

  panel.innerHTML = `
    <div class="saved-panel-header">
      <div>
        <div class="saved-panel-title">★ Saved Articles <span style="font-size:11px;color:var(--text-muted);font-weight:400">(${items.length})</span></div>
        <div class="saved-panel-subtitle">Persisted in your browser — available across sessions</div>
      </div>
      ${items.length > 0 ? `<button class="clear-saved-btn" onclick="clearAllSaved()">Clear all</button>` : ''}
    </div>
    ${listHtml}
  `;
}

function unsaveFromPanel(uid) {
  const favs = loadFavs();
  delete favs[uid];
  saveFavs(favs);
  updateSavedBadge();
  renderSavedPanel();
  const btn = document.querySelector(`.fav-btn[data-uid="${uid}"]`);
  if (btn) { btn.classList.remove('saved'); btn.textContent = '☆'; btn.title = 'Save to favorites'; }
}

function deleteFromSaved(uid) {
  // Remove from saved
  const favs = loadFavs();
  const article = favs[uid];
  if (article) {
    delete favs[uid];
    saveFavs(favs);
  }
  // Add to deleted
  const deleted = loadDeleted();
  deleted[uid] = {
    ...(article || { uid }),
    deleted_at: new Date().toISOString(),
  };
  saveDeleted(deleted);
  // Remove from article list if visible
  const card = document.querySelector(`.article-card[data-uid="${uid}"]`);
  if (card) { card.classList.add('deleted-card'); setTimeout(() => { card.remove(); updateArticleCount(); }, 260); }
  ARTICLES = ARTICLES.filter(a => a.uid !== uid);
  updateSavedBadge();
  updateDeletedBadge();
  renderSavedPanel();
  if (showingDeleted) renderDeletedPanel();
}

function clearAllSaved() {
  if (!confirm('Remove all saved articles?')) return;
  saveFavs({});
  updateSavedBadge();
  renderSavedPanel();
  document.querySelectorAll('.fav-btn.saved').forEach(btn => {
    btn.classList.remove('saved'); btn.textContent = '☆'; btn.title = 'Save to favorites';
  });
}

// ─── Deleted articles ─────────────────────────────────────────────────────────
const DELETED_KEY = 'oncopulse_deleted';
let showingDeleted = false;

function loadDeleted() {
  try { return JSON.parse(localStorage.getItem(DELETED_KEY) || '{}'); }
  catch { return {}; }
}

function saveDeleted(deleted) {
  localStorage.setItem(DELETED_KEY, JSON.stringify(deleted));
}

function isDeleted(uid) { return !!loadDeleted()[uid]; }

function deleteArticle(uid) {
  const article = ARTICLES.find(a => a.uid === uid);
  if (!article) return;

  // Store in deleted list
  const deleted = loadDeleted();
  deleted[uid] = {
    uid: article.uid,
    title: article.title,
    journal: article.journal,
    pub_date: article.pub_date,
    type: article.type,
    disease: article.disease,
    category: article.category,
    deleted_at: new Date().toISOString(),
  };
  saveDeleted(deleted);

  // Animate card out
  const card = document.querySelector(`.article-card[data-uid="${uid}"]`);
  if (card) {
    card.classList.add('deleted-card');
    setTimeout(() => { card.remove(); updateArticleCount(); }, 260);
  }

  // Also remove from ARTICLES array so it won't reappear on filter
  ARTICLES = ARTICLES.filter(a => a.uid !== uid);

  updateDeletedBadge();
  if (showingDeleted) renderDeletedPanel();
}

function restoreArticle(uid) {
  const deleted = loadDeleted();
  delete deleted[uid];
  saveDeleted(deleted);
  updateDeletedBadge();
  renderDeletedPanel();
  // Note: article won't reappear until next data.json reload
}

function updateArticleCount() {
  const list = document.getElementById('articleList');
  if (!list) return;
  const remaining = list.querySelectorAll('.article-card:not(.deleted-card)').length;
  const el = document.getElementById('countNum');
  if (el) el.textContent = remaining;
}

function updateDeletedBadge() {
  const count = Object.keys(loadDeleted()).length;
  const badge = document.getElementById('deletedCountBadge');
  const btn   = document.getElementById('deletedTabBtn');
  if (!badge || !btn) return;
  badge.textContent = count;
  badge.classList.toggle('visible', count > 0);
  btn.classList.toggle('active', showingDeleted);
}

function toggleDeletedPanel() {
  showingDeleted = !showingDeleted;
  document.getElementById('deletedTabBtn').classList.toggle('active', showingDeleted);
  const panel = document.getElementById('deletedPanel');
  if (!panel) return;
  if (showingDeleted) {
    panel.classList.add('visible');
    renderDeletedPanel();
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    panel.classList.remove('visible');
  }
}

function renderDeletedPanel() {
  const panel = document.getElementById('deletedPanel');
  if (!panel) return;
  const deleted = loadDeleted();
  const items = Object.values(deleted).sort((a, b) => (b.deleted_at || '').localeCompare(a.deleted_at || ''));

  const listHtml = items.length === 0
    ? `<div class="deleted-empty">No deleted articles.</div>`
    : `<div class="deleted-list">${items.map(a => {
        const typeLabel = a.type === 'fda' ? 'FDA' : a.type === 'phase3' ? 'Phase 3' : a.type === 'phase2' ? 'Phase 2' : 'Review';
        return `
        <div class="deleted-item">
          <div class="deleted-item-main">
            <div class="deleted-item-meta">${a.journal || ''} · ${typeLabel} · ${a.pub_date || ''}</div>
            <div class="deleted-item-title">${a.title}</div>
          </div>
          <button class="restore-btn" onclick="restoreArticle('${a.uid}')">↩ Restore</button>
        </div>`;
      }).join('')}</div>`;

  panel.innerHTML = `
    <div class="deleted-panel-header">
      <div>
        <div class="deleted-panel-title">🗑 Deleted Articles <span style="font-size:11px;color:var(--text-muted);font-weight:400">(${items.length})</span></div>
        <div class="deleted-panel-subtitle">Restore to bring back to your feed</div>
      </div>
      ${items.length > 0 ? `<button class="clear-saved-btn" onclick="clearAllDeleted()">Clear all</button>` : ''}
    </div>
    ${listHtml}
  `;
}

function clearAllDeleted() {
  if (!confirm('Permanently clear all deleted articles?')) return;
  saveDeleted({});
  updateDeletedBadge();
  renderDeletedPanel();
}

// ─── TTS ──────────────────────────────────────────────────────────────────────
const tts = { queue: [], idx: 0, utterance: null, paused: false, rate: 1.0, singleId: null };

function articleToSpeech(a) {
  const parts = [`${a.title}.`, `Published in ${a.journal}.`];
  if (a.abstract) parts.push(a.abstract);
  return parts.join(' ');
}

function ttsSpeak(text, onEnd) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = tts.rate; u.lang = 'en-US';
  u.onend = onEnd || null;
  u.onerror = e => { if (e.error !== 'interrupted') onEnd?.(); };
  tts.utterance = u;
  tts.paused = false;
  document.getElementById('ttsPlayPauseBtn').textContent = '⏸';
  window.speechSynthesis.speak(u);
}

function speakCard(articleId, btn) {
  const a = ARTICLES.find(x => x.uid === articleId);
  if (!a) return;
  if (tts.singleId === articleId && window.speechSynthesis.speaking) { ttsTogglePause(); return; }
  ttsStop(true);
  tts.singleId = articleId;
  tts.queue = [];
  document.querySelectorAll('.article-card').forEach(c => c.classList.remove('tts-active'));
  btn.closest('.article-card').classList.add('tts-active');
  btn.classList.add('speaking'); btn.textContent = '⏸';
  showTtsBar(a, 1, 1);
  ttsSpeak(articleToSpeech(a), () => {
    btn.classList.remove('speaking'); btn.textContent = '🔊';
    btn.closest('.article-card').classList.remove('tts-active');
    hideTtsBar(); tts.singleId = null;
  });
}

function toggleReadAll() {
  if (window.speechSynthesis.speaking || tts.queue.length > 0) { ttsStop(); return; }
  const cards = document.querySelectorAll('.article-card[data-uid]');
  if (!cards.length) return;
  tts.queue = Array.from(cards).map(el => ARTICLES.find(a => a.uid === el.dataset.uid)).filter(Boolean);
  tts.idx = 0; tts.singleId = null;
  document.getElementById('readAllBtn').classList.add('active');
  document.getElementById('readAllBtn').textContent = '■ Stop';
  playQueueItem(0);
}

function playQueueItem(idx) {
  if (idx >= tts.queue.length) { ttsStop(); return; }
  tts.idx = idx;
  const a = tts.queue[idx];
  document.querySelectorAll('.article-card').forEach(c => c.classList.remove('tts-active'));
  const card = document.querySelector(`.article-card[data-uid="${a.uid}"]`);
  if (card) {
    card.classList.add('tts-active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    const btn = card.querySelector('.speak-btn');
    if (btn) { btn.classList.add('speaking'); btn.textContent = '⏸'; }
  }
  showTtsBar(a, idx + 1, tts.queue.length);
  ttsSpeak(articleToSpeech(a), () => {
    if (card) {
      card.classList.remove('tts-active');
      const btn = card.querySelector('.speak-btn');
      if (btn) { btn.classList.remove('speaking'); btn.textContent = '🔊'; }
    }
    playQueueItem(idx + 1);
  });
}

function ttsNext() {
  if (!tts.queue.length) return;
  const card = document.querySelector(`.article-card[data-uid="${tts.queue[tts.idx]?.uid}"]`);
  if (card) { card.classList.remove('tts-active'); const b = card.querySelector('.speak-btn'); if(b){b.classList.remove('speaking');b.textContent='🔊';} }
  playQueueItem(tts.idx + 1);
}

function ttsPrev() {
  if (!tts.queue.length) return;
  const card = document.querySelector(`.article-card[data-uid="${tts.queue[tts.idx]?.uid}"]`);
  if (card) { card.classList.remove('tts-active'); const b = card.querySelector('.speak-btn'); if(b){b.classList.remove('speaking');b.textContent='🔊';} }
  playQueueItem(Math.max(0, tts.idx - 1));
}

function ttsTogglePause() {
  const btn = document.getElementById('ttsPlayPauseBtn');
  if (tts.paused) { window.speechSynthesis.resume(); tts.paused = false; btn.textContent = '⏸'; }
  else { window.speechSynthesis.pause(); tts.paused = true; btn.textContent = '▶'; }
}

function ttsSetSpeed(val) {
  tts.rate = parseFloat(val);
  if (window.speechSynthesis.speaking && tts.queue.length) playQueueItem(tts.idx);
}

function ttsStop(quiet = false) {
  window.speechSynthesis.cancel();
  tts.queue = []; tts.singleId = null; tts.paused = false;
  document.querySelectorAll('.article-card').forEach(c => {
    c.classList.remove('tts-active');
    const b = c.querySelector('.speak-btn');
    if (b) { b.classList.remove('speaking'); b.textContent = '🔊'; }
  });
  document.getElementById('readAllBtn').classList.remove('active');
  document.getElementById('readAllBtn').textContent = '▶ Read All';
  if (!quiet) hideTtsBar();
}

function showTtsBar(a, current, total) {
  document.getElementById('ttsTitle').textContent = a.title;
  document.getElementById('ttsCount').textContent = total > 1 ? `${current} / ${total}` : '';
  document.getElementById('ttsFill').style.width = total > 1 ? Math.round(((current-1)/total)*100)+'%' : '0%';
  document.getElementById('ttsBar').classList.add('visible');
  document.getElementById('ttsPlayPauseBtn').textContent = '⏸';
}

function hideTtsBar() { document.getElementById('ttsBar').classList.remove('visible'); }

// ─── Filters ──────────────────────────────────────────────────────────────────
function setTypeFilter(type, btn) {
  currentTypeFilter = type;
  document.querySelectorAll('#typeFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterByType(type) {
  currentTypeFilter = type;
  document.querySelectorAll('#typeFilters .filter-btn').forEach(b => {
    b.classList.toggle('active', type==='all' ? b.textContent.trim()==='All' : b.textContent.toLowerCase().includes(type));
  });
  applyFilters();
}

function setDiseaseFilter(d, btn) {
  currentDiseaseFilter = d;
  document.querySelectorAll('.disease-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const s = loadSettings();
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const sort = document.getElementById('sortSelect')?.value||'date';
  let filtered = ARTICLES.filter(a => {
    const mt = currentTypeFilter==='all' || a.type===currentTypeFilter;
    const md = currentDiseaseFilter==='all' || a.disease===currentDiseaseFilter;
    const ms = !q || a.title.toLowerCase().includes(q) || (a.abstract||'').toLowerCase().includes(q) || (a.journal||'').toLowerCase().includes(q);
    const sd = s.diseases.includes(a.disease);
    const sj = s.journals.length === 0 || s.journals.includes(a.journal);
    return mt && md && ms && sd && sj;
  });
  if (sort==='importance') filtered.sort((a,b)=>(b.importance_score||0)-(a.importance_score||0));
  else if (sort==='altmetric') filtered.sort((a,b)=>(b.altmetric_score||0)-(a.altmetric_score||0));
  else if (sort==='date') filtered.sort((a,b)=>(b.pub_date||'').localeCompare(a.pub_date||''));
  else filtered.sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  filtered = filtered.slice(0, s.maxDisplay);
  renderArticles(filtered);
  document.getElementById('countNum').textContent = filtered.length;
  updateSavedBadge();
  updateDeletedBadge();
  updateSettingsBanner();
}

function toggleAbstract(btn, uid) {
  const el = document.querySelector(`.abstract-text[data-uid="${uid}"]`);
  if (!el) return;
  const expanded = el.classList.toggle('expanded');
  btn.textContent = expanded ? '▲ Show less' : '▼ Read more';
}

function renderArticles(articles) {
  const list = document.getElementById('articleList');
  if (!list) return;
  if (!articles.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">◎</div><p>No articles match your filters.</p></div>`;
    return;
  }

  list.innerHTML = articles.map((a, i) => {
    const catBadge = a.category==='heme'
      ? `<span class="badge badge-heme">Heme</span>`
      : `<span class="badge badge-solid">Solid</span>`;
    const typeBadge = a.type==='fda'    ? `<span class="badge badge-fda">FDA</span>`
                    : a.type==='phase3' ? `<span class="badge badge-phase3">Ph3</span>`
                    : a.type==='phase2' ? `<span class="badge badge-phase2">Ph2</span>`
                    :                    `<span class="badge badge-review">Rev</span>`;

    const borderColor = a.category==='heme' ? 'var(--heme)' : 'var(--solid)';

    const abstractHtml = a.abstract
      ? `<div class="card-abstract abstract-text" data-uid="${a.uid}">${a.abstract}</div>
         <button class="expand-btn" onclick="toggleAbstract(this,'${a.uid}')">▼ Read more</button>`
      : '';

    const sourceLink = a.source_link
      ? `<a class="card-link" href="${a.source_link}" target="_blank" rel="noopener">↗ Source</a>`
      : '';
    const pubmedLink = a.pubmed_link
      ? `<a class="card-link pubmed" href="${a.pubmed_link}" target="_blank" rel="noopener">PubMed</a>`
      : '';

    const rankNum = a.rank || (i + 1);
    const isTop = rankNum <= 10;
    const rankHtml = `<div class="rank-badge ${isTop ? 'top' : ''}">#${rankNum}</div>`;

    const altScore = a.altmetric_score || 0;
    const altClass = altScore >= 100 ? 'very-high' : altScore >= 20 ? 'high' : '';
    let altHtml = '';
    if (altScore > 0) {
      if (a.altmetric_url) {
        altHtml = '<a class="altmetric-pill ' + altClass + '" href="' + a.altmetric_url + '" target="_blank" rel="noopener"><span>\u24B6</span> ' + Math.round(altScore) + '</a>';
      } else {
        altHtml = '<span class="altmetric-pill ' + altClass + '"><span>\u24B6</span> ' + Math.round(altScore) + '</span>';
      }
    }

    return `
    <div class="article-card" data-uid="${a.uid}" style="animation-delay:${i*0.03}s;border-left:3px solid ${borderColor}">
      <div class="card-top">
        ${rankHtml}
        <div class="badge-col">${catBadge}${typeBadge}</div>
        <div class="card-main">
          <div class="card-meta">${a.journal || ''}${a.pub_date ? ' · '+a.pub_date : ''}</div>
          <div class="card-title">${a.title}</div>
          ${abstractHtml}
          <div class="card-links">
            ${sourceLink}${pubmedLink}${altHtml}
            <button class="fav-btn${isFav(a.uid) ? ' saved' : ''}" data-uid="${a.uid}" onclick="toggleFav('${a.uid}',this)" title="${isFav(a.uid) ? 'Remove from favorites' : 'Save to favorites'}">${isFav(a.uid) ? '★' : '☆'}</button>
            <button class="del-btn" onclick="deleteArticle('${a.uid}')" title="Delete article">🗑</button>
            <button class="speak-btn" onclick="speakCard('${a.uid}',this)" title="Read aloud">🔊</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Get all leaf disease IDs from taxonomy
function getAllLeafIds() {
  const ids = [];
  function walk(nodes) {
    for (const n of nodes) {
      if (n.children) walk(n.children);
      else ids.push(n.id);
    }
  }
  NCCN_TAXONOMY.forEach(s => walk(s.children));
  return ids;
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || 'null');
    if (!s) return { ...DEFAULT_SETTINGS, diseases: [...ALL_LEAF_IDS], journals: [...ALL_JOURNAL_IDS] };
    return {
      granularity: s.granularity || 'broad',
      diseases:    s.diseases    || [...ALL_LEAF_IDS],
      journals:    s.journals    || [...ALL_JOURNAL_IDS],
      maxDisplay:  s.maxDisplay  || 150,
    };
  } catch { return { ...DEFAULT_SETTINGS, diseases: [...ALL_LEAF_IDS], journals: [...ALL_JOURNAL_IDS] }; }
}

    panel.classList.add('visible');
    renderSettingsPanel();
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    panel.classList.remove('visible');

}

function renderSettingsPanel() {
  const panel = document.getElementById('settingsPanel');
  if (!panel) return;
  const s = loadSettings();

  // Granularity buttons
  const granularityBtns = ['broad','mid','full'].map(g => {
    const labels = { broad: 'Broad (12 groups)', mid: 'Mid-level (NCCN sections)', full: 'Full NCCN (~60 entities)' };
    return `<button class="settings-chip ${s.granularity === g ? 'selected' : ''}"
      onclick="setGranularity('${g}')" style="padding:6px 14px">${labels[g]}</button>`;
  }).join('');

  // Disease section
  let diseaseHtml = '';
  if (s.granularity === 'broad') {
    diseaseHtml = renderBroadDiseaseChips(s);
  } else if (s.granularity === 'mid') {
    diseaseHtml = renderMidDiseaseChips(s);
  } else {
    diseaseHtml = renderFullDiseaseChips(s);
  }

  // Journal chips
  const generalChips = ALL_JOURNALS.general.map(j =>
    `<button class="settings-chip general-chip ${s.journals.includes(j.id) ? 'selected' : ''}"
      data-jid="${j.id}" onclick="toggleJournalChip(this,'${j.id}')">${j.label}</button>`
  ).join('');
  const specialistChips = ALL_JOURNALS.specialist.map(j =>
    `<button class="settings-chip ${s.journals.includes(j.id) ? 'selected' : ''}"
      data-jid="${j.id}" onclick="toggleJournalChip(this,'${j.id}')">${j.label}</button>`
  ).join('');

  panel.innerHTML = `
    <div class="settings-panel-header">
      <div>
        <div class="settings-panel-title">⚙ Personal Settings</div>
        <div class="settings-panel-subtitle">Saved to your browser — persists across sessions on this device</div>
      </div>
      <button class="settings-close-btn" onclick="toggleSettingsPanel()">← Back to Articles</button>
    </div>
    <div class="settings-body">
      <div>
        <div class="settings-section-title">🔍 Disease Granularity</div>
        <div class="settings-chip-group">${granularityBtns}</div>
      </div>
      <div id="diseaseSection">
        <div class="settings-section-title">🔬 Disease Areas</div>
        <div style="display:flex;gap:6px;margin-bottom:10px;">
          <button class="settings-chip selected" onclick="selectAllDiseases()" style="font-size:9px">Select All</button>
          <button class="settings-chip" onclick="clearAllDiseases()" style="font-size:9px">Clear All</button>
        </div>
        ${diseaseHtml}
      </div>
      <div>
        <div class="settings-section-title">📰 General Medical Journals</div>
        <div style="display:flex;gap:6px;margin-bottom:8px;">
          <button class="settings-chip selected" onclick="selectAllJournals('general')" style="font-size:9px">All</button>
          <button class="settings-chip" onclick="clearAllJournals('general')" style="font-size:9px">Clear</button>
        </div>
        <div class="settings-chip-group" id="generalJournalGroup">${generalChips}</div>
      </div>
      <div>
        <div class="settings-section-title">🩺 Oncology Specialist Journals</div>
        <div style="display:flex;gap:6px;margin-bottom:8px;">
          <button class="settings-chip selected" onclick="selectAllJournals('specialist')" style="font-size:9px">All</button>
          <button class="settings-chip" onclick="clearAllJournals('specialist')" style="font-size:9px">Clear</button>
        </div>
        <div class="settings-chip-group" id="specialistJournalGroup">${specialistChips}</div>
      </div>
      <div>
        <div class="settings-section-title">📊 Article Display Limit</div>
        <div class="settings-row">
          <input type="number" class="settings-number" id="maxDisplayInput"
            value="${s.maxDisplay}" min="10" max="500" step="10">
          <span class="settings-label">max articles shown per week</span>
        </div>
      </div>
      <div class="settings-row">
        <button class="settings-save-btn" onclick="applyAndSaveSettings()">✓ Save & Apply</button>
        <button class="settings-reset-btn" onclick="resetSettings()">Reset to defaults</button>
      </div>
    </div>
    <div class="settings-back-bar">
      <button onclick="toggleSettingsPanel()">← Done — Back to Articles</button>
    </div>
  `;
}

function renderBroadDiseaseChips(s) {
  return `<div class="settings-chip-group" id="diseaseChipGroup">${
    BROAD_GROUPS.map(g => {
      const allSelected = g.ids.every(id => s.diseases.includes(id));
      return `<button class="settings-chip ${g.cls} ${allSelected ? 'selected' : ''}"
        data-broad="${g.id}" data-ids="${g.ids.join(',')}"
        onclick="toggleBroadGroup(this)">${g.label}</button>`;
    }).join('')
  }</div>`;
}

function renderMidDiseaseChips(s) {
  return NCCN_TAXONOMY.map(sec => {
    const chips = sec.children.map(node => {
      if (node.children) {
        // Parent group
        const childIds = node.children.map(c => c.id);
        const allSel = childIds.every(id => s.diseases.includes(id));
        return `<div style="margin-bottom:8px;">
          <div style="font-size:9px;color:var(--text-muted);margin-bottom:4px;letter-spacing:0.06em">${node.label}</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;">
            ${node.children.map(c =>
              `<button class="settings-chip ${sec.category==='heme'?'heme-chip':''} ${s.diseases.includes(c.id)?'selected':''}"
                data-did="${c.id}" onclick="toggleDiseaseChip(this,'${c.id}')">${c.label}</button>`
            ).join('')}
          </div>
        </div>`;
      } else {
        return `<button class="settings-chip ${sec.category==='heme'?'heme-chip':''} ${s.diseases.includes(node.id)?'selected':''}"
          data-did="${node.id}" onclick="toggleDiseaseChip(this,'${node.id}')">${node.label}</button>`;
      }
    }).join('');
    return `<div style="margin-bottom:16px;">
      <div style="font-size:10px;font-weight:700;color:${sec.category==='heme'?'var(--heme)':'var(--solid)'};
        margin-bottom:8px;text-transform:uppercase;letter-spacing:0.08em">${sec.section}</div>
      <div class="settings-chip-group">${chips}</div>
    </div>`;
  }).join('');
}

function renderFullDiseaseChips(s) {
  return NCCN_TAXONOMY.map(sec => {
    const chips = sec.children.map(node => {
      if (node.children) {
        const subchips = node.children.map(c =>
          `<button class="settings-chip ${sec.category==='heme'?'heme-chip':''} ${s.diseases.includes(c.id)?'selected':''}"
            data-did="${c.id}" onclick="toggleDiseaseChip(this,'${c.id}')">${c.label}</button>`
        ).join('');
        const childIds = node.children.map(c => c.id);
        const allSel = childIds.every(id => s.diseases.includes(id));
        return `<div style="margin-bottom:10px;padding:8px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <button class="settings-chip ${sec.category==='heme'?'heme-chip':''} ${allSel?'selected':''}"
              data-group-ids="${childIds.join(',')}" onclick="toggleParentGroup(this)"
              style="font-size:9px;font-weight:700">▶ ${node.label}</button>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;padding-left:8px;">${subchips}</div>
        </div>`;
      } else {
        return `<button class="settings-chip ${sec.category==='heme'?'heme-chip':''} ${s.diseases.includes(node.id)?'selected':''}"
          data-did="${node.id}" onclick="toggleDiseaseChip(this,'${node.id}')">${node.label}</button>`;
      }
    }).join('');
    return `<div style="margin-bottom:20px;">
      <div style="font-size:10px;font-weight:700;color:${sec.category==='heme'?'var(--heme)':'var(--solid)'};
        margin-bottom:8px;text-transform:uppercase;letter-spacing:0.08em">${sec.section}</div>
      <div class="settings-chip-group" style="flex-direction:column;align-items:flex-start;">${chips}</div>
    </div>`;
  }).join('');
}

function setGranularity(g) {
  const s = loadSettings();
  s.granularity = g;
  saveSettings(s);
  renderSettingsPanel();
}

function toggleBroadGroup(btn) {
  const ids = btn.dataset.ids.split(',');
  const nowSelected = btn.classList.toggle('selected');
  // Also update underlying leaf selections
  const s = loadSettings();
  if (nowSelected) {
    ids.forEach(id => { if (!s.diseases.includes(id)) s.diseases.push(id); });
  } else {
    s.diseases = s.diseases.filter(id => !ids.includes(id));
  }
  saveSettings(s);
}

function toggleDiseaseChip(btn, id) {
  btn.classList.toggle('selected');
  // Update parent group button if in full mode
  const parentBtn = btn.closest('[data-group-ids]');
  if (parentBtn) {
    const groupIds = parentBtn.dataset.groupIds.split(',');
    const allSelected = groupIds.every(gid => {
      const b = document.querySelector(`[data-did="${gid}"]`);
      return b && b.classList.contains('selected');
    });
    parentBtn.classList.toggle('selected', allSelected);
  }
}

function toggleParentGroup(btn) {
  const ids = btn.dataset.groupIds.split(',');
  const nowSelected = btn.classList.toggle('selected');
  ids.forEach(id => {
    const child = document.querySelector(`[data-did="${id}"]`);
    if (child) child.classList.toggle('selected', nowSelected);
  });
}

function toggleJournalChip(btn, id) { btn.classList.toggle('selected'); }

function selectAllDiseases() {
  document.querySelectorAll('[data-did],[data-broad],[data-group-ids]').forEach(b => b.classList.add('selected'));
}
function clearAllDiseases() {
  document.querySelectorAll('[data-did],[data-broad],[data-group-ids]').forEach(b => b.classList.remove('selected'));
}
function selectAllJournals(type) {
  const grp = type === 'general' ? 'generalJournalGroup' : 'specialistJournalGroup';
  document.querySelectorAll(`#${grp} .settings-chip`).forEach(b => b.classList.add('selected'));
}
function clearAllJournals(type) {
  const grp = type === 'general' ? 'generalJournalGroup' : 'specialistJournalGroup';
  document.querySelectorAll(`#${grp} .settings-chip`).forEach(b => b.classList.remove('selected'));
}

function applyAndSaveSettings() {
  const s = loadSettings();

  // Collect selected diseases
  let diseases = [];
  if (s.granularity === 'broad') {
    document.querySelectorAll('[data-broad].selected').forEach(btn => {
      btn.dataset.ids.split(',').forEach(id => { if (!diseases.includes(id)) diseases.push(id); });
    });
  } else {
    document.querySelectorAll('[data-did].selected').forEach(btn => {
      diseases.push(btn.dataset.did);
    });
  }
  if (!diseases.length) diseases = [...ALL_LEAF_IDS];

  // Collect journals
  const journals = [];
  document.querySelectorAll('[data-jid].selected').forEach(btn => journals.push(btn.dataset.jid));

  const maxDisplay = parseInt(document.getElementById('maxDisplayInput')?.value || '150', 10);

  const newS = { granularity: s.granularity, diseases, journals, maxDisplay };
  saveSettings(newS);
  applyFilters();
  updateSettingsBanner();

  const btn = document.querySelector('.settings-save-btn');
  if (btn) { btn.textContent = '✓ Saved!'; setTimeout(() => { btn.textContent = '✓ Save & Apply'; }, 1500); }
}

function resetSettings() {
  saveSettings({ granularity: 'broad', diseases: [...ALL_LEAF_IDS], journals: [...ALL_JOURNAL_IDS], maxDisplay: 150 });
  renderSettingsPanel();
  applyFilters();
  updateSettingsBanner();
}

function updateSettingsBanner() {
  const banner = document.getElementById('settingsBanner');
  if (!banner) return;
  const s = loadSettings();
  if (isCustomSettings(s)) {
    const parts = [];
    if (s.diseases.length < ALL_LEAF_IDS.length) parts.push(`${s.diseases.length} diseases`);
    if (s.journals.length < ALL_JOURNAL_IDS.length) parts.push(`${s.journals.length} journals`);
    if (s.maxDisplay !== 150) parts.push(`max ${s.maxDisplay}`);
    banner.textContent = `⚙ Custom filter active: ${parts.join(' · ')} — click Settings to change`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
(async () => {
  try {
    const data = await loadData();
    // Filter out previously deleted articles on load
    const deletedUids = loadDeleted();
    ARTICLES = (data.articles || []).filter(a => !deletedUids[a.uid]);
    renderLayout(data);
    updateDeletedBadge();
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `
      <div class="error-box">
        <h3>Could not load data</h3>
        <p>Make sure <code>data.json</code> exists in the dashboard folder.<br>
        Run: <code>python pipeline/fetch_and_summarize.py</code><br><br>
        Error: ${e.message}</p>
      </div>`;
  }
})();
</script>
</body>
</html>
