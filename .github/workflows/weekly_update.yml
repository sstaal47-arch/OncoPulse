name: OncoPulse Weekly Literature Update

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 6:00 AM UTC
  workflow_dispatch:
    inputs:
      days:
        description: "Days to look back"
        required: false
        default: "7"
      max_articles:
        description: "Max articles"
        required: false
        default: "100"

jobs:
  update-literature:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run OncoPulse pipeline
        env:
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
          OUTPUT_DIR:     ./dashboard
          CACHE_DIR:      ./pipeline/.cache
          LOOKBACK_DAYS:  ${{ github.event.inputs.days || '7' }}
          MAX_ARTICLES:   ${{ github.event.inputs.max_articles || '100' }}
        run: |
          python pipeline/fetch_and_summarize.py \
            --days ${{ github.event.inputs.days || 7 }} \
            --max-articles ${{ github.event.inputs.max_articles || 100 }}

      - name: Commit and push
        run: |
          git config user.name  "OncoPulse Bot"
          git config user.email "oncopulse-bot@users.noreply.github.com"
          git add dashboard/data.json pipeline/.cache/
          git diff --staged --quiet || git commit -m "chore: weekly update $(date +'%Y-%m-%d')"
          git push

      - name: Summary
        run: |
          echo "## OncoPulse Update" >> $GITHUB_STEP_SUMMARY
          if [ -f dashboard/data.json ]; then
            TOTAL=$(python3 -c "import json; d=json.load(open('dashboard/data.json')); print(d['stats']['total'])")
            WEEK=$(python3 -c "import json; d=json.load(open('dashboard/data.json')); print(d['week_label'])")
            echo "- **Week:** $WEEK" >> $GITHUB_STEP_SUMMARY
            echo "- **Articles:** $TOTAL" >> $GITHUB_STEP_SUMMARY
          fi
